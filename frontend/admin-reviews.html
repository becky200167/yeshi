<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>评价审核</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>评价审核</h1>
      <div>
        <a class="nav-btn" href="./admin.html">管理员首页</a>
        <a class="nav-btn" href="./admin-submissions.html">摊位审核</a>
        <a class="nav-btn" href="./admin-stalls.html">摊位管理</a>
        <a class="nav-btn" href="./admin-users.html">用户管理</a>
        <a class="nav-btn" href="./admin-logs.html">审核记录</a>
        <button id="logoutBtn">退出登录</button>
      </div>
    </header>

    <main class="page stack-gap">
      <section class="card">
        <h2>评价审核与管理</h2>
        <div class="inline-form">
          <select id="reviewStatusFilter">
            <option value="pending">待审核</option>
            <option value="approved">已通过</option>
            <option value="rejected">已驳回</option>
            <option value="">全部</option>
          </select>
          <input id="reviewSearchInput" type="text" placeholder="关键词：内容/用户/摊位" />
          <button id="reviewSearchBtn" type="button">搜索</button>
          <button id="loadReviewsBtn" type="button">刷新评价</button>
        </div>
        <div class="inline-form">
          <button id="batchApproveReviewsBtn" type="button">批量通过</button>
          <button id="batchRejectReviewsBtn" type="button">批量驳回</button>
          <span id="reviewBatchHint" class="hint">未选择记录</span>
        </div>
        <ul id="adminReviewsList" class="list"></ul>
        <div class="inline-form">
          <button id="reviewPrevPageBtn" type="button">上一页</button>
          <span id="reviewPageInfo" class="hint"></span>
          <button id="reviewNextPageBtn" type="button">下一页</button>
        </div>
      </section>
      <p id="adminMsg" class="hint"></p>
    </main>

    <div id="adminStallPreviewModal" class="modal hidden">
      <div class="modal-card modal-card-admin-preview">
        <div class="admin-preview-toolbar">
          <div>
            <h3 id="adminPreviewHeading">摊位预览</h3>
            <p id="adminPreviewContext" class="hint"></p>
          </div>
          <button id="adminPreviewCloseBtn" type="button">关闭</button>
        </div>
        <p id="adminPreviewNotice" class="hint preview-notice"></p>
        <div id="adminPreviewActions" class="admin-preview-actions"></div>
        <div class="grid-two admin-preview-grid">
          <section>
            <div id="adminPreviewMap" class="map-box map-mid"></div>
            <section class="card">
              <h2 id="adminPreviewTitle">正在加载...</h2>
              <div id="adminPreviewDetail" class="hint">正在加载摊位详情</div>
            </section>
          </section>
          <section class="card side-panel">
            <h2>管理员上下文</h2>
            <div id="adminPreviewMeta" class="hint"></div>
            <p id="adminPreviewReviewSummary" class="hint">暂无评价数据</p>
            <h3>摊位评价</h3>
            <ul id="adminPreviewReviewsList" class="list"></ul>
          </section>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./auth.js"></script>
    <script src="./image-viewer.js"></script>
    <script src="./admin-stall-preview.js"></script>
    <script src="./admin-reviews.js"></script>
  </body>
</html>
