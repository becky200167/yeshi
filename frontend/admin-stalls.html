<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摊位管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>摊位管理</h1>
      <div>
        <a class="nav-btn" href="./admin.html">管理员首页</a>
        <a class="nav-btn" href="./admin-submissions.html">摊位审核</a>
        <a class="nav-btn" href="./admin-reviews.html">评价审核</a>
        <a class="nav-btn" href="./admin-users.html">用户管理</a>
        <a class="nav-btn" href="./admin-logs.html">审核记录</a>
        <button id="logoutBtn">退出登录</button>
      </div>
    </header>

    <main class="page stack-gap">
      <section class="card">
        <h2>摊位上下架与删除</h2>
        <div class="inline-form">
          <select id="stallStatusFilter">
            <option value="">全部状态</option>
            <option value="approved">已上架</option>
            <option value="offline">已下架</option>
          </select>
          <input id="stallSearchInput" type="text" placeholder="关键词：摊位名/商户" />
          <button id="stallSearchBtn" type="button">搜索</button>
          <button id="loadStallsBtn" type="button">刷新</button>
        </div>
        <ul id="adminStallsList" class="list"></ul>
        <div class="inline-form">
          <button id="stallPrevPageBtn" type="button">上一页</button>
          <span id="stallPageInfo" class="hint"></span>
          <button id="stallNextPageBtn" type="button">下一页</button>
        </div>
      </section>
      <p id="adminMsg" class="hint"></p>
    </main>

    <script src="./auth.js"></script>
    <script src="./admin-stalls.js"></script>
  </body>
</html>
