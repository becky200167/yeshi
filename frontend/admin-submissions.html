<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摊位审核</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>摊位审核</h1>
      <div>
        <a class="nav-btn" href="./admin.html">管理员首页</a>
        <a class="nav-btn" href="./admin-reviews.html">评价审核</a>
        <a class="nav-btn" href="./admin-users.html">用户管理</a>
        <a class="nav-btn" href="./admin-logs.html">审核记录</a>
        <button id="logoutBtn">退出登录</button>
      </div>
    </header>

    <main class="page stack-gap">
      <section class="card">
        <h2>摊位提交审核</h2>
        <div class="inline-form">
          <select id="submissionStatusFilter">
            <option value="pending">待审核</option>
            <option value="approved">已通过</option>
            <option value="rejected">已驳回</option>
            <option value="">全部</option>
          </select>
          <button id="loadPendingBtn" type="button">刷新提交记录</button>
        </div>
        <ul id="pendingList" class="list"></ul>
      </section>
      <p id="adminMsg" class="hint"></p>
    </main>

    <script src="./auth.js"></script>
    <script src="./admin-submissions.js"></script>
  </body>
</html>
