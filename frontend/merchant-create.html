<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新增摊位</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>新增摊位</h1>
      <div>
        <a class="nav-btn" href="./merchant.html">返回商户端</a>
        <a class="nav-btn notif-btn" href="./notifications.html?role=merchant"><span>消息中心</span><span id="notificationDot" class="notif-dot hidden"></span></a>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </header>

    <main class="page stack-gap">
      <section class="card">
        <h2>提交新增申请</h2>
        <form id="createStallForm" class="form-grid">
          <label>摊位名<input name="name" required /></label>
          <label>经营类别<input name="category" required /></label>
          <label>营业时间<input name="open_time" placeholder="18:00-23:00" required /></label>
          <label>摊位图片（可多选）
            <input id="imageFilesInput" name="image_files" type="file" accept="image/*" multiple />
          </label>
          <div class="inline-form location-tools">
            <button id="openCreateLocationPickerBtn" type="button">地图选点</button>
            <span class="hint">点击后弹出地图与搜索框选位置</span>
          </div>
          <label>经度<input id="lngInput" name="lng" type="number" step="0.000001" required /></label>
          <label>纬度<input id="latInput" name="lat" type="number" step="0.000001" required /></label>
          <label>简介<textarea name="description" rows="3"></textarea></label>
          <button type="submit">提交审核</button>
        </form>
        <p id="createMsg" class="hint"></p>
      </section>
    </main>

    <div id="createLocationPickerModal" class="modal hidden">
      <div class="modal-card modal-card-wide">
        <h3>地图选点</h3>
        <p id="createLocationPickerMsg" class="hint"></p>
        <div class="inline-form location-tools">
          <input id="createLocationSearchInput" type="text" placeholder="搜索位置，如：黄兴路步行街" />
          <button id="createLocationSearchBtn" type="button">搜索定位</button>
          <button id="createLocationLocateBtn" type="button">当前定位</button>
          <button id="createLocationConfirmBtn" type="button">确认选点</button>
          <button id="createLocationCancelBtn" type="button">取消</button>
        </div>
        <div id="createLocationMap" class="map-box map-mid"></div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./auth.js"></script>
    <script src="./merchant-create.js"></script>
  </body>
</html>
