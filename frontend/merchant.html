<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商户端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>商户端</h1>
      <div>
        <a class="nav-btn" href="./merchant-create.html">新增摊位</a>
        <a class="nav-btn notif-btn" href="./notifications.html?role=merchant"><span>消息中心</span><span id="notificationDot" class="notif-dot hidden"></span></a>
        <button id="refreshBtn" type="button">刷新</button>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </header>

    <main class="page stack-gap">
      <section class="card">
        <h2>选择管理摊位</h2>
        <div class="inline-form">
          <select id="managedStallSelect"></select>
          <button id="switchManagedStallBtn" type="button">进入管理</button>
          <span id="managedStallHint" class="hint">请先选择一个已上传摊位</span>
        </div>
      </section>

      <section class="grid-two">
        <section class="card">
          <h2>摊位地图</h2>
          <div id="merchantMap" class="map-box map-mid"></div>
        </section>

        <section class="card side-panel">
          <h2 id="selectedStallTitle">请选择摊位</h2>
          <div id="selectedStallDetail" class="hint">右侧显示摊位管理信息</div>
          <div class="panel-actions">
            <button id="editStallBtn" type="button">修改摊位信息</button>
            <button id="openStallBtn" type="button">出摊</button>
            <button id="closeStallBtn" type="button">收摊</button>
            <button id="loadMerchantReviewsBtn" type="button">刷新评价</button>
          </div>
          <p id="merchantMsg" class="hint"></p>

          <h3>顾客评价与回复</h3>
          <ul id="merchantReviewsList" class="list"></ul>
        </section>
      </section>

      <section class="card">
        <h2>我的提交记录</h2>
        <ul id="mySubmissionsList" class="list"></ul>
      </section>
    </main>

    <div id="editStallModal" class="modal hidden">
      <div class="modal-card">
        <h3>修改摊位信息（提交审核）</h3>
        <form id="editStallForm" class="form-grid">
          <label>摊位名<input name="name" required /></label>
          <label>经营类别<input name="category" required /></label>
          <label>营业时间<input name="open_time" required /></label>
          <label>摊位图片（可多选）
            <input id="editImageFilesInput" name="image_files" type="file" accept="image/*" multiple />
          </label>
          <label>经度<input name="lng" type="number" step="0.000001" required /></label>
          <label>纬度<input name="lat" type="number" step="0.000001" required /></label>
          <label>简介<textarea name="description" rows="3"></textarea></label>
          <div class="panel-actions">
            <button type="submit">提交审核</button>
            <button id="closeEditModalBtn" type="button">取消</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./auth.js"></script>
    <script src="./merchant.js"></script>
  </body>
</html>
